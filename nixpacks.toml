# Railway Nixpacks konfiguratsiyasi (Docker'siz).
# Next.js avtomatik aniqlanadi; biz faqat tizim FFmpeg + fontconfig qo'shamiz.

[phases.setup]
aptPkgs = ["ffmpeg", "fontconfig"]

[variables]
# Tizim FFmpeg'idan foydalanamiz (libass + fontsdir to'liq ishlaydi)
FFMPEG_PATH = "/usr/bin/ffmpeg"
NODE_ENV = "production"
